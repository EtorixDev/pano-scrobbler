name: Build binaries
permissions:
  actions: read
  contents: read
on:
  workflow_dispatch:
    inputs:
      upload-release:
        type: boolean
        description: 'Upload to GitHub Releases?'
        required: false
        default: false
jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ windows-2025-vs2026, ubuntu-latest, ubuntu-24.04-arm ]
        include:
          - os: windows-2025-vs2026
            resources-dir: windows-x64
          - os: ubuntu-latest
            resources-dir: linux-x64
          - os: ubuntu-24.04-arm
            resources-dir: linux-arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Fix permissions
        if: matrix.resources-dir != 'windows-x64'
        shell: bash
        run: |
          chmod +x ./gradlew

      - name: Set up common secrets
        shell: bash
        env:
          LOCAL_PROPERTIES_SECRET: ${{ secrets.LOCAL_PROPERTIES }}
        run: |
          printf '%s' "$LOCAL_PROPERTIES_SECRET" > local.properties

      - if: matrix.resources-dir == 'linux-x64'
        name: Set up Android signing
        shell: bash
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_JKS }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_B64" | base64 -d - > androidApp/android-keystore.jks

      - if: matrix.resources-dir == 'linux-x64'
        name: Build APK
        shell: bash
        run: |
          export JAVA_HOME=$JAVA_HOME_21_X64
          ./gradlew androidApp:assembleReleaseGithub --no-daemon

      - if: matrix.resources-dir == 'linux-x64'
        name: Upload Android binary
        uses: actions/upload-artifact@v6
        with:
          name: pano-scrobbler-etd-android-universal
          path: dist/pano-scrobbler-etd-android-universal*

      - name: Install Liberica NIK (GraalVM)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'liberica'
          github-token: ${{ github.token }}

      - name: Download native libraries
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=$(gh run list \
            -R "EtorixDev/pano-native-components" \
            -L 20 \
            --json databaseId,workflowName,headBranch,status,conclusion \
            -q 'map(select(.workflowName == "Build" and .headBranch == "main" and .status == "completed" and .conclusion == "success"))[0].databaseId')

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "No successful runs found" >&2
            exit 1
          fi

          # Download artifacts from that run (filter by name if provided)
          gh run download "$RUN_ID" -R "EtorixDev/pano-native-components" -n "libs-${{ matrix.resources-dir }}" -D composeApp/resources/${{ matrix.resources-dir }}

      - name: Build desktop jar and native image
        shell: bash
        run: |
          ./gradlew composeApp:exportLibraryDefinitions composeApp:packageUberJarForCurrentOS -PaboutLibraries.exportVariant=desktop --no-daemon

      - name: Upload desktop binary
        uses: actions/upload-artifact@v6
        with:
          name: pano-scrobbler-etd-${{ matrix.resources-dir }}
          path: dist/pano-scrobbler-etd-${{ matrix.resources-dir }}*
  
  upload-release:
    needs: [ build ]
    runs-on: windows-2025-vs2026
    if: ${{ inputs.upload-release == true }}
    permissions:
      actions: read
      contents: write
    steps:
      - name: Read version and fork changelog
        id: release_metadata
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          upstreamVerCode="$(gh api -H "Accept: application/vnd.github.raw" "/repos/${GITHUB_REPOSITORY}/contents/version.txt?ref=${GITHUB_SHA}")"
          upstreamVerCode="$(echo "$upstreamVerCode" | tr -d '\r\n' | xargs)"
          forkVerCode="$(gh api -H "Accept: application/vnd.github.raw" "/repos/${GITHUB_REPOSITORY}/contents/version-fork.txt?ref=${GITHUB_SHA}")"
          forkVerCode="$(echo "$forkVerCode" | tr -d '\r\n' | xargs)"
          upstreamVerName="$((upstreamVerCode / 100)).$((upstreamVerCode % 100))"
          verCode="$forkVerCode"
          verName="$upstreamVerName-etd.$forkVerCode"
          echo "verCode=$verCode" >> "$GITHUB_OUTPUT"
          echo "verName=$verName" >> "$GITHUB_OUTPUT"
          
          changelog="$(gh api -H "Accept: application/vnd.github.raw" "/repos/${GITHUB_REPOSITORY}/contents/changelog-fork.md?ref=${GITHUB_SHA}")"
          {
            echo "changelog<<EOF"
            echo "Based on [Pano Scrobbler](https://github.com/kawaiiDango/pano-scrobbler/releases) $upstreamVerName"
            echo
            echo "$changelog"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ steps.release_metadata.outputs.verCode }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release_metadata.outputs.verName }}
          body: ${{ steps.release_metadata.outputs.changelog }}
          files: dist/**
